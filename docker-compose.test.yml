services:
  postgres_test:
    image: postgres:17-alpine
    container_name: umkm_erp_postgres_test
    restart: unless-stopped
    environment:
      POSTGRES_USER: erp
      POSTGRES_PASSWORD: erp
      POSTGRES_DB: erp_test
    ports:
      - '15433:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U erp -d erp_test']
      interval: 5s
      timeout: 3s
      retries: 10

  redis_test:
    image: redis:8-alpine
    container_name: umkm_erp_redis_test
    restart: unless-stopped
    ports:
      - '6380:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10
